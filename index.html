<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <title>Wonen Monitor Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: #f5f2ea;
      --paper: #fcfaf5;
      --ink: #24211b;
      --muted: #6e6b62;
      --line: #d4cfc2;
      --accent: #214d7b;
      --danger: #9b2b30;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--ink); font-family: system-ui, sans-serif; padding: 16px; }
    .page { max-width: 1200px; margin: 0 auto; background: var(--paper); border: 1px solid var(--line); }
    header { padding: 20px; border-bottom: 1px solid var(--line); }
    h1 { font-family: Georgia, serif; font-size: 30px; }
    p.sub { color: var(--muted); margin-top: 6px; }
    .kpis { display:flex; flex-wrap:wrap; gap:12px; margin-top:12px; font-size:13px; color:var(--muted); }
    .layout { display:grid; grid-template-columns: 1.8fr 1fr; gap: 24px; padding: 20px; }
    .rubric { font-size: 11px; text-transform: uppercase; letter-spacing: .14em; color: var(--muted); border-bottom: 1px solid var(--line); padding-bottom: 4px; margin-bottom: 12px; }
    .article { border-bottom: 1px solid rgba(0,0,0,.08); padding-bottom: 14px; margin-bottom: 14px; }
    .meta { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
    .article h2 { font-family: Georgia, serif; font-size: 19px; line-height: 1.3; margin-bottom: 6px; }
    .article h2 a { color: var(--ink); text-decoration: none; }
    .article h2 a:hover, .source-link:hover { text-decoration: underline; color: var(--accent); }
    .summary { font-size: 14px; line-height: 1.6; color: #413d34; }
    .foot { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-top:8px; font-size:11px; }
    .label { border:1px solid rgba(0,0,0,.2); padding:2px 6px; text-transform:uppercase; letter-spacing:.12em; }
    .priority { color: var(--danger); border-color: var(--danger); }
    .policy { color: var(--accent); border-color: var(--accent); }
    .source-link { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
    .chips { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
    .chip { font-size: 10px; border:1px solid rgba(0,0,0,.15); padding:2px 5px; text-transform:uppercase; letter-spacing:.12em; }
    .muted { color: var(--muted); }
    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1>Ochtendkrant Wonen & Vastgoed</h1>
      <p class="sub" id="run-summary">Laden…</p>
      <div class="kpis" id="kpis"></div>
    </header>
    <div class="layout">
      <section>
        <div class="rubric">Topverhalen</div>
        <div id="priority-list"></div>
        <div class="rubric" style="margin-top:20px;">Verder in het nieuws</div>
        <div id="other-list"></div>
      </section>
      <aside>
        <div class="rubric">Tweede Kamer & beleid</div>
        <div id="politics-list"></div>
        <div class="rubric" style="margin-top:20px;">Vastgoedmarkt & deals</div>
        <div id="realestate-list"></div>
      </aside>
    </div>
  </div>
<script>
<script>
(async function () {
  const RUN_FILE = "data/latest.json";
  const priorityList = document.getElementById("priority-list");
  const otherList = document.getElementById("other-list");
  const politicsList = document.getElementById("politics-list");
  const realestateList = document.getElementById("realestate-list");

  function esc(str) {
    return String(str ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function card(item) {
    const labels = item.labels || [];
    const isPolitics =
      (item.entity_type || "").toLowerCase() === "activiteit" ||
      ["politics", "policy"].includes(item.source_category || "");

    const tags = (item.matched_profiles || [])
      .concat(item.matched_angles || [])
      .map(x => `<span class="chip">${esc(String(x).replaceAll("_", " "))}</span>`)
      .join("");

    return `
      <article class="article">
        <div class="meta">${esc(item.source_name)} · ${esc(item.source_category)} · score ${esc(item.score ?? 0)}</div>
        <h2><a href="${esc(item.url || "#")}" target="_blank" rel="noopener noreferrer">${esc(item.title)}</a></h2>
        <p class="summary">${esc((item.summary || "").slice(0, 320))}</p>
        <div class="foot">
          ${labels.includes("priority") ? '<span class="label priority">prioriteit</span>' : ""}
          ${isPolitics ? '<span class="label policy">kamer/beleid</span>' : ""}
          ${item.url ? `<a class="source-link" href="${esc(item.url)}" target="_blank" rel="noopener noreferrer">naar bron</a>` : '<span class="muted">geen bronlink</span>'}
        </div>
        <div class="chips">${tags}</div>
      </article>`;
  }

  try {
    const resp = await fetch(RUN_FILE);
    if (!resp.ok) throw new Error("Kon JSON niet laden");
    const items = await resp.json();

    const priority = [];
    const politics = [];
    const realestate = [];
    const other = [];

    items.forEach(item => {
      const isPriority = (item.labels || []).includes("priority");
      const isPolitics =
        (item.entity_type || "").toLowerCase() === "activiteit" ||
        ["politics", "policy"].includes(item.source_category || "");
      const isRealEstate = (item.matched_profiles || []).includes("vastgoedmarkt_en_transacties");

      if (isPriority) priority.push(item);
      else if (isPolitics) politics.push(item);
      else if (isRealEstate) realestate.push(item);
      else other.push(item);
    });

    document.getElementById("run-summary").textContent = `${items.length} stukken geladen uit data/latest.json`;
    document.getElementById("kpis").innerHTML = `
      <span>Totaal: ${items.length}</span>
      <span>Prioriteit: ${priority.length}</span>
      <span>Politiek/beleid: ${politics.length}</span>
      <span>Vastgoed: ${realestate.length}</span>`;

    priorityList.innerHTML = priority.length
      ? priority.slice(0, 8).map(card).join("")
      : '<p class="muted">Nog geen prioriteitsitems.</p>';

    otherList.innerHTML = other.length
      ? other.slice(0, 12).map(card).join("")
      : '<p class="muted">Nog geen overige items.</p>';

    politicsList.innerHTML = politics.length
      ? politics.slice(0, 6).map(card).join("")
      : '<p class="muted">Nog geen politieke items.</p>';

    realestateList.innerHTML = realestate.length
      ? realestate.slice(0, 6).map(card).join("")
      : '<p class="muted">Nog geen vastgoeditems.</p>';
  } catch (e) {
    document.getElementById("run-summary").textContent = "Kon data/latest.json niet laden.";
  }
})();
</script>
</script>
</body>
</html>
